<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de CEP</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro de Endereço</h1>

      <div class="busca-setion">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
        <div class="buttons">
          <button id="btn-buscar">Buscar</button>
          <button id="btn-limpar" class="btn-secondary">Limpar</button>
        </div>
      </div>

      <hr />

      <div class="formulario">
        <div class="campo">
          <label>Rua:</label>
          <input type="text" id="rua" readonly placeholder="..." />
        </div>
        <div class="campo">
          <label>Bairro:</label>
          <input type="text" id="bairro" readonly placeholder="..." />
        </div>
        <div class="campo">
          <label>Cidade:</label>
          <input type="text" id="cidade" readonly placeholder="..." />
        </div>
        <div class="campo">
          <label>Estado (UF):</label>
          <input type="text" id="uf" readonly placeholder="..." />
        </div>
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
